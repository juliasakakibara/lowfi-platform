<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>SUPER BRUNO BROS.</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        overflow: hidden;
        background: #87ceeb;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #app {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100dvh;
        background: #87ceeb;
      }
      #game-root {
        flex: 1;
        min-height: 0;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-root canvas {
        display: block;
        /* Kaboom define o tamanho (letterbox); não forçar 100%×100% */
        max-width: 100%;
        max-height: 100%;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }
      #touch-bar {
        display: none;
        flex-shrink: 0;
        height: 96px;
        padding: 12px 16px;
        padding-bottom: max(12px, env(safe-area-inset-bottom));
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        background: rgba(255, 255, 255, 0.92);
        border-top: 2px solid #282832;
      }
      /* CSS puro — mais confiável que JS no DevTools device mode */
      @media (max-width: 900px), (hover: none) and (pointer: coarse) {
        #touch-bar {
          display: flex;
        }
      }

      #touch-bar .touch-dirs {
        display: flex;
        gap: 12px;
      }
      #touch-bar button {
        min-width: 64px;
        height: 64px;
        padding: 0 16px;
        border: 2px solid #282832;
        border-radius: 12px;
        background: #fff;
        color: #1e1e28;
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
        -webkit-tap-highlight-color: transparent;
        touch-action: none;
      }
      #touch-bar button[data-action="jump"] {
        min-width: 96px;
        font-size: 18px;
      }
      #touch-bar button.is-active {
        background: #d0d8e8;
      }
      #boot-msg {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, sans-serif;
        text-align: center;
        color: #333;
        padding: 2rem;
        pointer-events: none;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="game-root">
        <p id="boot-msg">Carregando o jogo…</p>
      </div>
      <div id="touch-bar">

        <div class="touch-dirs">
          <button type="button" data-dir="left" aria-label="Esquerda">&lt;</button>
          <button type="button" data-dir="right" aria-label="Direita">&gt;</button>
        </div>
        <button type="button" data-action="jump">Pular</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
      window.addEventListener(
        "error",
        (event) => {
          const msg = document.getElementById("boot-msg");
          if (!msg) return;
          const file = event.filename || "";
          if (file.includes("main.js") || file.includes("/src/")) {
            msg.textContent =
              "Versão antiga em cache. Pressione Cmd+Shift+R (Mac) ou Ctrl+Shift+R (Windows) para atualizar.";
          }
        },
        true,
      );
    </script>
  </body>
</html>
